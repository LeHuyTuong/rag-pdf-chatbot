server.port=8080
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_DATABASE:rag}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:raguser}
spring.datasource.password=${DB_PASSWORD:ragpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE_MB:25}MB
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE_MB:25}MB
jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
jwt.expires-in=${JWT_EXPIRES_IN:86400000}
rag.api.url=${RAG_API_URL:http://localhost:8000}
storage.path=${STORAGE_PATH:/app/storage/uploads}
